<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kotost Coin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="coin-display">
                <img src="images/coin.png" alt="coin" class="coin-icon">
                <span id="coinCount">0</span>
            </div>
            <div class="power-display">
                ⚡ Сила клика: <span id="clickPower">1</span>
            </div>
        </div>

        <div class="game-area">
            <img src="images/cat.png" alt="Kotost" id="cat" class="cat-image">
            <div id="floatingNumbers"></div>
        </div>

        <div class="shop">
            <button id="upgradeBtn" class="shop-btn">
                💪 Улучшить лапу (+1 клик)
                <span id="upgradePrice">50</span> 🪙
            </button>
        </div>

        <div class="stats">
            <p>📊 Улучшений куплено: <span id="upgradeCount">0</span></p>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
