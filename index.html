<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kotost Coin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="coin-display">
                <img src="images/coin.png" alt="coin" class="coin-icon">
                <span id="coinCount">0</span>
            </div>
            <div class="stars-display">
                ⭐ <span id="starsCount">0</span>
            </div>
            <div class="power-display">
                ⚡ <span id="clickPower">1</span>
            </div>
        </div>

        <div class="game-area">
            <img src="images/cat_base.png" alt="Kotost" id="cat" class="cat-image">
            <div id="floatingNumbers"></div>
        </div>

        <div class="buttons">
            <button id="upgradeBtn" class="action-btn">💪 Улучшить (+1) - <span id="upgradePrice">50</span> 🪙</button>
            <button id="dailyBtn" class="action-btn">🎁 Ежедневный бонус</button>
            <button id="skinsBtn" class="action-btn">🎨 Магазин скинов</button>
            <button id="leaderboardBtn" class="action-btn">🏆 Лидерборд</button>
        </div>

        <div class="stats">
            <p>📊 Улучшений: <span id="upgradeCount">0</span> | 🐾 Всего кликов: <span id="totalClicks">0</span></p>
        </div>
    </div>

    <!-- Модалка магазина скинов -->
    <div id="skinModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <h2>🎨 Магазин скинов</h2>
            <div id="skinsShop" class="skins-shop"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
